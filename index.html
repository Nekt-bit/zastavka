<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compak — Ігровий ПК "Мощь"</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: #0b0b0d;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }
        .container {
            background: #151518;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 212, 255, 0.1);
            max-width: 400px;
            width: 90%;
            overflow: hidden;
            border: 1px solid #2a2a2e;
            text-align: center;
        }
        .brand-header {
            padding: 20px;
            background: #1c1c21;
            font-weight: bold;
            letter-spacing: 4px;
            color: #00d4ff;
            border-bottom: 1px solid #2a2a2e;
        }
        .image-container {
            padding: 15px;
        }
        .pc-image {
            width: 100%;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }
        .pc-image:hover {
            transform: scale(1.02);
        }
        .content {
            padding: 0 25px 25px;
        }
        h1 {
            font-size: 2.2rem;
            margin: 15px 0;
            background: linear-gradient(45deg, #00d4ff, #0055ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .price-tag {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .specs-list {
            text-align: left;
            background: #1e1e24;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px dashed #3a3a40;
        }
        .specs-list ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .specs-list li {
            margin-bottom: 10px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }
        .specs-list li::before {
            content: "⚡";
            margin-right: 10px;
            font-size: 0.8rem;
        }
        .buy-btn {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #00d4ff, #0055ff);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .buy-btn:hover {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            transform: translateY(-2px);
        }
        .gallery-text {
            font-size: 0.8rem;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-header">COMPAK</div>
        
        <div class="image-container">
            <img src="1000410122.jpg" alt="Вигляд спереду" class="pc-image">
        </div>

        <div class="content">
            <h1>"МОЩЬ"</h1>
            <div class="price-tag">30,000 ₴</div>

            <div class="specs-list">
                <ul>
                    <li><strong>CPU:</strong> Ryzen 5 5500</li>
                    <li><strong>GPU:</strong> RTX 2060 Super 8GB</li>
                    <li><strong>RAM:</strong> 16GB Kingston</li>
                    <li><strong>SSD:</strong> Швидкий накопичувач</li>
                    <li><strong>Охолодження:</strong> RGB Air Cooling</li>
                </ul>
            </div>

            <button class="buy-btn">КУПИТИ ЗАРАЗ</button>
            
            <p class="gallery-text">Зібрано з любов'ю до заліза</p>
        </div>
    </div>

</body>
</html>
